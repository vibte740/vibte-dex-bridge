version: "3.9"

networks:
  trading-net:
    driver: bridge

services:
  vibte-bridge:
    build:
      context: .
      target: runner
    container_name: vibte-bridge
    env_file: .env
    ports:
      - "8080:8080"
    restart: always
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "1.0"
    networks:
      - trading-net
    depends_on:
      redis:
        condition: service_healthy
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    container_name: vibte-redis
    restart: always
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - trading-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 128m
